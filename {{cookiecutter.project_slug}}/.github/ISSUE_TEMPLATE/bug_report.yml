# bug_report.yml
# {{ cookiecutter.project_name }}
#
# Copyright © {{ cookiecutter.__year }} {{ cookiecutter.owner }}. All rights reserved.
#
# GitHub issue form for reporting reproducible bugs.
#
# Responsibilities
# - Gather the minimum information needed to reproduce and triage defects.
#
# Maintainer Notes
# - Keep the prompts focused on actionable reproduction details for
#   maintainers.

---

name: Bug Report
description: Report a reproducible problem or defect in {{ cookiecutter.project_name }}.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for maintainers to reproduce the problem on a clean checkout or install.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
      placeholder: A short description of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide exact steps, commands, configuration, and/or sample inputs needed to reproduce the bug.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste any traceback, command output, logs, screenshots, or failing assertion.
      render: text
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, tag, or commit shows the problem?
      placeholder: v1.2.3 or abc1234
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, runtime, browser, service, or other relevant environment details.
      placeholder: macOS 15, Python 3.13, Chrome 142, etc.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the current default branch or latest release.
          required: true
        - label: I included enough detail for maintainers to reproduce or investigate the issue.
          required: true
